[project]
name = "infergrid"
version = "0.1.0"
description = "Adaptive inference orchestration for LLM serving"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = [
    "numpy>=1.24",
    "pyyaml>=6.0",
    "prometheus-client>=0.19",
    "httpx>=0.25",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "black>=23.0",
    "ruff>=0.1",
    "mypy>=1.0",
]
profiling = [
    "py-spy>=0.3",
    "nvidia-ml-py>=12.0",
    "matplotlib>=3.7",
    "pandas>=2.0",
]
vllm = ["vllm>=0.6.0"]
sglang = ["sglang>=0.3.0"]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.backends._legacy:_Backend"

[tool.black]
line-length = 88

[tool.ruff]
line-length = 88
select = ["E", "F", "I", "N", "W"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
